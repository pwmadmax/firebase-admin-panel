<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secure Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0f2027;
color:white;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

.card{
background:#1c2b3a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
padding:7px 10px;
border:none;
border-radius:6px;
font-size:12px;
cursor:pointer;
margin:3px;
}

.primary{background:#0072ff;color:white}
.danger{background:#ff4d4d;color:white}
.success{background:#00aa66;color:white}
.secondary{background:#666;color:white}
.warning{background:#ffaa00;color:black}

.stats{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

.stat{
background:#15222e;
padding:10px;
border-radius:8px;
font-size:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:10px;
}

.keyCard{
background:#15222e;
padding:10px;
border-radius:10px;
font-size:12px;
}

.keyHeader{
font-weight:600;
word-break:break-all;
margin-bottom:5px;
}

.badge{
padding:2px 6px;
border-radius:5px;
font-size:11px;
}

.active{background:#00aa66}
.expired{background:#ff8800}
.blocked{background:#ff4d4d}
.unused{background:#777}
</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="primary" id="loginBtn">Login</button>
</div>

<div id="dashboard" style="display:none">

<div class="card">
<h2>Generate Key</h2>

<input id="customKey" placeholder="Custom Key (optional)">
<input id="durationInput" type="number" placeholder="Duration Hours">
<input id="maxDevices" type="number" placeholder="Max Devices (default 1)">
<input id="note" placeholder="Notes">

<button class="primary" id="generateBtn">Generate</button>
<button class="secondary" id="logoutBtn">Logout</button>

<div id="genOutput"></div>
</div>

<div class="card">

<div id="stats" class="stats"></div>

<input id="searchBox" placeholder="Search key / UID">

<div id="keysContainer" class="grid"></div>

</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCunwuvg0saSDxN7HbNwmwaIdOuBYA-tX0",
authDomain:"pw--login.firebaseapp.com",
projectId:"pw--login",
appId:"1:1062401933606:web:6f0fc04649cc77707841e7"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* AUTH */

auth.onAuthStateChanged(async user=>{

if(!user){
loginBox.style.display="block";
dashboard.style.display="none";
return;
}

const adminDoc=await db.collection("admins").doc(user.uid).get();

if(!adminDoc.exists){
alert("Not authorized");
auth.signOut();
return;
}

loginBox.style.display="none";
dashboard.style.display="block";

loadKeys();

});

/* LOGIN */

loginBtn.onclick=()=>{
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
};

logoutBtn.onclick=()=>auth.signOut();

/* KEY GENERATOR */

function generateRandomKey(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let key="";

for(let i=0;i<10;i++){
key+=chars[Math.floor(Math.random()*chars.length)];
}

return key;

}

/* GENERATE KEY */

generateBtn.onclick=async()=>{

const custom=document.getElementById("customKey").value.trim();
const duration=parseInt(document.getElementById("durationInput").value);
const max=parseInt(document.getElementById("maxDevices").value)||1;
const note=document.getElementById("note").value||"";

if(!duration){
alert("Enter duration");
return;
}

const key=custom||generateRandomKey();

const ref=db.collection("keys").doc(key);
const existing=await ref.get();

if(existing.exists){
alert("Key already exists");
return;
}

await ref.set({
active:true,
blocked:false,
used:false,
used_by:"",
devices:[],
duration_hours:duration,
max_devices:max,
note:note,
created_at:firebase.firestore.Timestamp.now(),
activated_at:null,
access_expires:null
});

genOutput.innerText="Generated: "+key;

};

/* LOAD KEYS */

function loadKeys(){

db.collection("keys")
.orderBy("created_at","desc")
.onSnapshot(snapshot=>{

keysContainer.innerHTML="";

let total=0,active=0,expired=0,blocked=0,unused=0;

snapshot.forEach(doc=>{

total++;

const d=doc.data();
const key=doc.id;

let status="unused";
let label="Unused";

if(d.blocked){
status="blocked";label="Blocked";blocked++;
}
else if(d.used){

if(d.access_expires && d.access_expires.toDate()<new Date()){
status="expired";label="Expired";expired++;
}else{
status="active";label="Active";active++;
}

}else{
unused++;
}

let activated="Not activated";
if(d.activated_at){
activated=d.activated_at.toDate().toLocaleString();
}

let expires="Not activated";
if(d.access_expires){
expires=d.access_expires.toDate().toLocaleString();
}

const devices=(d.devices||[]).length;

const card=document.createElement("div");

card.className="keyCard";

card.innerHTML=`

<div class="keyHeader">${key}</div>
<div class="badge ${status}">${label}</div>

<div>Devices: ${devices}/${d.max_devices}</div>
<div>User: ${d.used_by||"-"}</div>
<div>Activated: ${activated}</div>
<div>Expires: ${expires}</div>
<div>Note: ${d.note||"-"}</div>

<button onclick="copyKey('${key}')">Copy</button>
<button onclick="extendKey('${key}',1)">+1h</button>
<button onclick="extendKey('${key}',24)">+24h</button>
<button onclick="resetDevices('${key}')">Reset Devices</button>
<button onclick="resetKey('${key}')">Reset</button>
<button onclick="toggleBlock('${key}',${d.blocked})">${d.blocked?'Unblock':'Block'}</button>
<button onclick="deleteKey('${key}')">Delete</button>

`;

keysContainer.appendChild(card);

});

stats.innerHTML=`
<div class="stat">Total: ${total}</div>
<div class="stat">Active: ${active}</div>
<div class="stat">Expired: ${expired}</div>
<div class="stat">Blocked: ${blocked}</div>
<div class="stat">Unused: ${unused}</div>
`;

});

}

/* ACTIONS */

function copyKey(key){
navigator.clipboard.writeText(key);
}

async function extendKey(key,hours){

const ref=db.collection("keys").doc(key);
const doc=await ref.get();
const data=doc.data();

let expire;

if(data.access_expires){
expire=new Date(data.access_expires.toDate().getTime()+hours*3600000);
}else{
expire=new Date(Date.now()+hours*3600000);
}

await ref.update({
access_expires:expire
});

}

async function resetDevices(key){
await db.collection("keys").doc(key).update({devices:[]});
}

async function resetKey(key){

await db.collection("keys").doc(key).update({
used:false,
used_by:"",
devices:[],
activated_at:null,
access_expires:null
});

}

async function toggleBlock(key,state){
await db.collection("keys").doc(key).update({blocked:!state});
}

async function deleteKey(key){
if(confirm("Delete key?")){
await db.collection("keys").doc(key).delete();
}
}

/* SEARCH */

searchBox.oninput=()=>{
const text=searchBox.value.toLowerCase();
document.querySelectorAll(".keyCard").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(text)?"block":"none";
});
};

</script>

</body>
</html>

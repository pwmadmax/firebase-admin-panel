<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secure Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system;
background:#0b0f14;
color:#e6edf3;
}

.container{
padding:14px;
max-width:1000px;
margin:auto;
}

.card{
background:#161b22;
padding:16px;
border-radius:12px;
margin-bottom:16px;
box-shadow:0 0 0 1px #30363d;
}

h2{
margin:0 0 14px;
font-weight:600;
font-size:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #30363d;
background:#0d1117;
color:white;
font-size:14px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
font-size:13px;
cursor:pointer;
white-space:nowrap;
}

.btnRow{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.primary{background:#238636;color:white}
.secondary{background:#30363d;color:white}
.success{background:#2ea043;color:white}
.warning{background:#d29922;color:black}
.danger{background:#da3633;color:white}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-bottom:16px;
}

.stat{
background:#0d1117;
padding:12px;
border-radius:8px;
font-size:13px;
text-align:center;
border:1px solid #30363d;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:12px;
}

.keyCard{
background:#0d1117;
border:1px solid #30363d;
padding:14px;
border-radius:10px;
}

.keyHeader{
font-weight:600;
font-size:15px;
margin-bottom:6px;
word-break:break-all;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:11px;
display:inline-block;
margin-bottom:8px;
}

.active{background:#2ea043}
.expired{background:#d29922}
.blocked{background:#da3633}
.unused{background:#6e7681}

.generatedBox{
margin-top:14px;
padding:14px;
border-radius:10px;
background:#0d1117;
border:1px solid #30363d;
}

.generatedKey{
font-size:20px;
font-weight:600;
margin-bottom:6px;
word-break:break-all;
}

.keyGuide{
margin-top:10px;
font-size:12px;
line-height:1.5;
color:#9da7b3;
background:#0b0f14;
padding:10px;
border-radius:8px;
border:1px dashed #30363d;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:10px;
}

@media (max-width:480px){

h2{font-size:18px;}

button{flex:1;}

}

</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="primary" id="loginBtn">Login</button>
</div>

<div id="dashboard" style="display:none">

<div class="card">

<h2>Generate Key</h2>

<input id="customKey" placeholder="Custom Key (optional)">
<input id="durationInput" type="number" placeholder="Duration (hours)">
<input id="note" placeholder="Note (optional)">

<div class="btnRow">
<button class="primary" id="generateBtn">Generate Key</button>
<button class="secondary" id="logoutBtn">Logout</button>
</div>

<div id="genOutput"></div>

</div>

<div class="card">

<div id="stats" class="stats"></div>

<input id="searchBox" placeholder="Search key / UID">

<div id="keysContainer" class="grid"></div>

</div>

</div>

</div>

<script>

/* FORMAT FUNCTION */

function formatDuration(hours){

const d=Math.floor(hours/24);
const h=hours%24;

if(d>0){
return d+"d "+h+"h";
}

return h+"h";

}

const firebaseConfig={
apiKey:"AIzaSyCunwuvg0saSDxN7HbNwmwaIdOuBYA-tX0",
authDomain:"pw--login.firebaseapp.com",
projectId:"pw--login",
appId:"1:1062401933606:web:6f0fc04649cc77707841e7"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

loginBtn.onclick=()=>{
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
};

logoutBtn.onclick=()=>auth.signOut();

auth.onAuthStateChanged(async user=>{

if(!user){
loginBox.style.display="block";
dashboard.style.display="none";
return;
}

const adminDoc=await db.collection("admins").doc(user.uid).get();

if(!adminDoc.exists){
alert("Not authorized");
auth.signOut();
return;
}

loginBox.style.display="none";
dashboard.style.display="block";

loadKeys();

});

function generateRandomKey(){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let key="";
for(let i=0;i<10;i++){
key+=chars[Math.floor(Math.random()*chars.length)];
}
return key;
}

generateBtn.onclick=async()=>{

const custom=customKey.value.trim();
const duration=parseInt(durationInput.value);
const noteText=note.value||"";

if(!duration){
alert("Enter duration");
return;
}

const key=custom||generateRandomKey();

const ref=db.collection("keys").doc(key);
const exists=await ref.get();

if(exists.exists){
alert("Key already exists");
return;
}

await ref.set({
active:true,
blocked:false,
used:false,
used_by:"",
duration_hours:duration,
note:noteText,
created_at:firebase.firestore.Timestamp.now(),
activated_at:null,
access_expires:null
});

const message=`🔐 Access Key

Key: ${key}
Duration: ${formatDuration(duration)}
Note: ${noteText || "-"}

Usage Guide:
• Key works on ONE device only
• Do not clear app data
• Do not share publicly
• Key will expire automatically`;

genOutput.innerHTML=`

<div class="generatedBox">

<div>Generated Key</div>
<div class="generatedKey">${key}</div>

<div>Duration: ${formatDuration(duration)}</div>
<div>Note: ${noteText || "-"}</div>

<div class="btnRow">
<button class="success" onclick="copyKey('${key}')">Copy</button>
<button class="primary" onclick="shareKey(\`${message}\`)">Share</button>
</div>

<div class="keyGuide">
<b>Usage Guide</b><br>
• Key works on ONE device only<br>
• Do not clear app data<br>
• Do not share publicly<br>
• Key will expire automatically
</div>

</div>

`;

};

function shareKey(text){

if(navigator.share){
navigator.share({text:text});
}else{
navigator.clipboard.writeText(text);
alert("Key info copied");
}

}

function copyKey(key){
navigator.clipboard.writeText(key);
}

function loadKeys(){

db.collection("keys")
.orderBy("created_at","desc")
.onSnapshot(snapshot=>{

keysContainer.innerHTML="";

let total=0,active=0,expired=0,blocked=0,unused=0;

snapshot.forEach(doc=>{

total++;

const d=doc.data();
const key=doc.id;

let status="unused";
let label="Unused";

if(d.blocked){
status="blocked";label="Blocked";blocked++;
}
else if(d.used){

if(d.access_expires && d.access_expires.toDate()<new Date()){
status="expired";label="Expired";expired++;
}else{
status="active";label="Active";active++;
}

}else{
unused++;
}

let activated="Not activated";
if(d.activated_at){
activated=d.activated_at.toDate().toLocaleString();
}

let expires="Not activated";
if(d.access_expires){
expires=d.access_expires.toDate().toLocaleString();
}

const message=`🔐 Access Key

Key: ${key}
Duration: ${formatDuration(d.duration_hours)}
Note: ${d.note || "-"}

Usage Guide:
• Key works on ONE device only
• Do not clear app data
• Do not share publicly`;

const card=document.createElement("div");
card.className="keyCard";

card.innerHTML=`

<div class="keyHeader">${key}</div>
<div class="badge ${status}">${label}</div>

<div><b>Duration:</b> ${formatDuration(d.duration_hours)}</div>
<div><b>User:</b> ${d.used_by||"-"}</div>
<div><b>Activated:</b> ${activated}</div>
<div><b>Expires:</b> ${expires}</div>
<div><b>Note:</b> ${d.note||"-"}</div>

<div class="actions">
<button class="secondary" onclick="copyKey('${key}')">Copy</button>
<button class="primary" onclick="shareKey(\`${message}\`)">Share</button>
<button class="success" onclick="extendKey('${key}',1)">+1h</button>
<button class="success" onclick="extendKey('${key}',24)">+24h</button>
<button class="warning" onclick="resetKey('${key}')">Reset</button>
<button class="danger" onclick="deleteKey('${key}')">Delete</button>
</div>

`;

keysContainer.appendChild(card);

});

stats.innerHTML=`
<div class="stat">Total: ${total}</div>
<div class="stat">Active: ${active}</div>
<div class="stat">Expired: ${expired}</div>
<div class="stat">Unused: ${unused}</div>
`;

});

}

async function extendKey(key,hours){

const ref=db.collection("keys").doc(key);
const doc=await ref.get();
const data=doc.data();

let expire;

if(data.access_expires){
expire=new Date(data.access_expires.toDate().getTime()+hours*3600000);
}else{
expire=new Date(Date.now()+hours*3600000);
}

const newDuration=(data.duration_hours || 0) + hours;

await ref.update({
access_expires:expire,
duration_hours:newDuration
});

}

async function resetKey(key){

await db.collection("keys").doc(key).update({
used:false,
used_by:"",
activated_at:null,
access_expires:null
});

}

async function deleteKey(key){
if(confirm("Delete key?")){
await db.collection("keys").doc(key).delete();
}
}

searchBox.oninput=()=>{
const text=searchBox.value.toLowerCase();
document.querySelectorAll(".keyCard").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(text)?"block":"none";
});
};

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      background:#111;
      color:white;
      font-family:sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top:50px;
    }
    input, button {
      padding:10px;
      margin:5px;
      border-radius:6px;
      border:none;
    }
    button {
      background:#0088cc;
      color:white;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h2>Admin Login</h2>

<div id="loginBox">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
  <h2>Generate Key</h2>
  <input type="number" id="duration" placeholder="Duration (hours)">
  <button onclick="generateKey()">Generate</button>
  <p id="output"></p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCunwuvg0saSDxN7HbNwmwaIdOuBYA-tX0",
  authDomain: "pw--login.firebaseapp.com",
  projectId: "pw--login",
  appId: "1:1062401933606:web:6f0fc04649cc77707841e7"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("loginBox").style.display="none";
      document.getElementById("dashboard").style.display="block";
    })
    .catch(err => alert(err.message));
}

async function generateKey(){

  const duration = parseInt(document.getElementById("duration").value);

  if(!duration){
    alert("Enter duration");
    return;
  }

  const key = Math.random().toString(36).substring(2,10).toUpperCase();

  await db.collection("keys").doc(key).set({
    active:true,
    used:false,
    duration_hours:duration,
    used_by:""
  });

  document.getElementById("output").innerText="Generated Key: " + key;
}
</script>

</body>
</html>

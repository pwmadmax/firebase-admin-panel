<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secure Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0b0f14;
color:#e6edf3;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:#161b22;
padding:18px;
border-radius:12px;
margin-bottom:18px;
box-shadow:0 0 0 1px #30363d;
}

h2{
margin:0 0 12px 0;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #30363d;
background:#0d1117;
color:white;
}

button{
padding:7px 12px;
border:none;
border-radius:6px;
font-size:12px;
cursor:pointer;
margin:4px;
}

.primary{background:#238636;color:white}
.secondary{background:#30363d;color:white}
.success{background:#2ea043;color:white}
.warning{background:#d29922;color:black}
.danger{background:#da3633;color:white}

.stats{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.stat{
background:#0d1117;
padding:10px 14px;
border-radius:8px;
font-size:13px;
border:1px solid #30363d;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:12px;
}

.keyCard{
background:#0d1117;
border:1px solid #30363d;
padding:14px;
border-radius:10px;
}

.keyHeader{
font-weight:600;
margin-bottom:6px;
word-break:break-all;
font-size:16px;
}

.badge{
padding:3px 7px;
border-radius:6px;
font-size:11px;
margin-bottom:8px;
display:inline-block;
}

.active{background:#2ea043}
.expired{background:#d29922}
.blocked{background:#da3633}
.unused{background:#6e7681}

.generatedBox{
margin-top:10px;
padding:12px;
background:#0d1117;
border:1px solid #30363d;
border-radius:8px;
}

.generatedKey{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}

.actions{
margin-top:8px;
}

</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="primary" id="loginBtn">Login</button>
</div>

<div id="dashboard" style="display:none">

<div class="card">

<h2>Generate Key</h2>

<input id="customKey" placeholder="Custom Key (optional)">
<input id="durationInput" type="number" placeholder="Duration (hours)">
<input id="note" placeholder="Note (optional)">

<button class="primary" id="generateBtn">Generate Key</button>
<button class="secondary" id="logoutBtn">Logout</button>

<div id="genOutput"></div>

</div>

<div class="card">

<div id="stats" class="stats"></div>

<input id="searchBox" placeholder="Search key / UID">

<div id="keysContainer" class="grid"></div>

</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCunwuvg0saSDxN7HbNwmwaIdOuBYA-tX0",
authDomain:"pw--login.firebaseapp.com",
projectId:"pw--login",
appId:"1:1062401933606:web:6f0fc04649cc77707841e7"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* AUTH */

auth.onAuthStateChanged(async user=>{

if(!user){
loginBox.style.display="block";
dashboard.style.display="none";
return;
}

const adminDoc=await db.collection("admins").doc(user.uid).get();

if(!adminDoc.exists){
alert("Not authorized");
auth.signOut();
return;
}

loginBox.style.display="none";
dashboard.style.display="block";

loadKeys();

});

/* LOGIN */

loginBtn.onclick=()=>{
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
};

logoutBtn.onclick=()=>auth.signOut();

/* KEY GENERATOR */

function generateRandomKey(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let key="";

for(let i=0;i<10;i++){
key+=chars[Math.floor(Math.random()*chars.length)];
}

return key;

}

/* GENERATE KEY */

generateBtn.onclick=async()=>{

const custom=customKey.value.trim();
const duration=parseInt(durationInput.value);
const noteText=note.value||"";

if(!duration){
alert("Enter duration");
return;
}

const key=custom||generateRandomKey();

const ref=db.collection("keys").doc(key);
const exists=await ref.get();

if(exists.exists){
alert("Key already exists");
return;
}

await ref.set({
active:true,
blocked:false,
used:false,
used_by:"",
duration_hours:duration,
note:noteText,
created_at:firebase.firestore.Timestamp.now(),
activated_at:null,
access_expires:null
});

/* Generated Key UI */

genOutput.innerHTML=`
<div class="generatedBox">

<div>Generated Key</div>

<div class="generatedKey">${key}</div>

<div>Duration: ${duration} hours</div>
<div>Note: ${noteText || "-"}</div>

<button class="success" onclick="copyKey('${key}')">Copy Key</button>

</div>
`;

};

/* LOAD KEYS */

function loadKeys(){

db.collection("keys")
.orderBy("created_at","desc")
.onSnapshot(snapshot=>{

keysContainer.innerHTML="";

let total=0,active=0,expired=0,blocked=0,unused=0;

snapshot.forEach(doc=>{

total++;

const d=doc.data();
const key=doc.id;

let status="unused";
let label="Unused";

if(d.blocked){
status="blocked";label="Blocked";blocked++;
}
else if(d.used){

if(d.access_expires && d.access_expires.toDate()<new Date()){
status="expired";label="Expired";expired++;
}else{
status="active";label="Active";active++;
}

}else{
unused++;
}

let activated="Not activated";

if(d.activated_at){
activated=d.activated_at.toDate().toLocaleString();
}

let expires="Not activated";

if(d.access_expires){
expires=d.access_expires.toDate().toLocaleString();
}

const card=document.createElement("div");

card.className="keyCard";

card.innerHTML=`

<div class="keyHeader">${key}</div>

<div class="badge ${status}">${label}</div>

<div><b>Duration:</b> ${d.duration_hours}h</div>
<div><b>User:</b> ${d.used_by||"-"}</div>
<div><b>Activated:</b> ${activated}</div>
<div><b>Expires:</b> ${expires}</div>
<div><b>Note:</b> ${d.note||"-"}</div>

<div class="actions">
<button class="secondary" onclick="copyKey('${key}')">Copy</button>
<button class="success" onclick="extendKey('${key}',1)">+1h</button>
<button class="success" onclick="extendKey('${key}',24)">+24h</button>
<button class="warning" onclick="resetKey('${key}')">Reset</button>
<button class="primary" onclick="toggleBlock('${key}',${d.blocked})">${d.blocked?'Unblock':'Block'}</button>
<button class="danger" onclick="deleteKey('${key}')">Delete</button>
</div>

`;

keysContainer.appendChild(card);

});

stats.innerHTML=`
<div class="stat">Total: ${total}</div>
<div class="stat">Active: ${active}</div>
<div class="stat">Expired: ${expired}</div>
<div class="stat">Blocked: ${blocked}</div>
<div class="stat">Unused: ${unused}</div>
`;

});

}

/* ACTIONS */

function copyKey(key){
navigator.clipboard.writeText(key);
}

async function extendKey(key,hours){

const ref=db.collection("keys").doc(key);
const doc=await ref.get();
const data=doc.data();

let expire;

if(data.access_expires){
expire=new Date(data.access_expires.toDate().getTime()+hours*3600000);
}else{
expire=new Date(Date.now()+hours*3600000);
}

await ref.update({access_expires:expire});

}

async function resetKey(key){

await db.collection("keys").doc(key).update({
used:false,
used_by:"",
activated_at:null,
access_expires:null
});

}

async function toggleBlock(key,state){
await db.collection("keys").doc(key).update({blocked:!state});
}

async function deleteKey(key){
if(confirm("Delete key?")){
await db.collection("keys").doc(key).delete();
}
}

/* SEARCH */

searchBox.oninput=()=>{
const text=searchBox.value.toLowerCase();
document.querySelectorAll(".keyCard").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(text)?"block":"none";
});
};

</script>

</body>
</html>

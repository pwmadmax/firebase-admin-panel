<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f2027;
  color:white;
}

.container{
  padding:15px;
  max-width:100%;
}

.card{
  background:#1c2b3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

h2{
  margin:0 0 10px 0;
  font-size:18px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:8px 10px;
  border:none;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  margin:3px 3px 3px 0;
}

.primary{ background:#0072ff; color:white; }
.danger{ background:#ff4d4d; color:white; }
.secondary{ background:#666; color:white; }
.success{ background:#00aa66; color:white; }

.keyCard{
  background:#15222e;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  font-size:12px;
}

.keyHeader{
  font-weight:600;
  margin-bottom:5px;
  word-break:break-all;
}

.status-used{ color:#00ff99; }
.status-unused{ color:#ffaa00; }
.status-blocked{ color:#ff4d4d; }

.flex{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
}
</style>
</head>
<body>

<div class="container">

<div id="loginBox" class="card">
<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button class="primary" id="loginBtn">Login</button>
</div>

<div id="dashboard" style="display:none;">

<div class="card">
<h2>Generate Key</h2>
<input type="text" id="customKey" placeholder="Custom Key (optional)">
<input type="number" id="duration" placeholder="Duration (hours)">
<input type="number" id="maxDevices" placeholder="Max Devices (default 1)">
<button class="primary" id="generateBtn">Generate</button>
<button class="secondary" id="logoutBtn">Logout</button>
<div id="genOutput"></div>
</div>

<div class="card">
<h2>All Keys</h2>
<div id="stats"></div>
<div id="keysContainer"></div>
</div>

</div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCunwuvg0saSDxN7HbNwmwaIdOuBYA-tX0",
  authDomain: "pw--login.firebaseapp.com",
  projectId: "pw--login",
  appId: "1:1062401933606:web:6f0fc04649cc77707841e7"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* ================= AUTH ================= */

auth.onAuthStateChanged(async user => {

  if(!user){
    showLogin();
    return;
  }

  const adminDoc = await db.collection("admins").doc(user.uid).get();
  if(!adminDoc.exists){
    alert("Not authorized");
    auth.signOut();
    return;
  }

  showDashboard();
  loadKeys();
});

function showLogin(){
  document.getElementById("loginBox").style.display="block";
  document.getElementById("dashboard").style.display="none";
}

function showDashboard(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("dashboard").style.display="block";
}

/* ================= LOGIN ================= */

document.getElementById("loginBtn").onclick = () => {
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).catch(e=>alert(e.message));
};

document.getElementById("logoutBtn").onclick = () => auth.signOut();

/* ================= GENERATE KEY ================= */

function generateRandomKey(){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let key="";
  const arr=new Uint32Array(10);
  crypto.getRandomValues(arr);
  for(let i=0;i<10;i++){
    key+=chars[arr[i]%chars.length];
  }
  return key;
}

document.getElementById("generateBtn").onclick = async () => {

  const custom = document.getElementById("customKey").value.trim();
  const duration = parseInt(document.getElementById("duration").value);
  const maxDevices = parseInt(document.getElementById("maxDevices").value)||1;

  if(!duration){ alert("Enter duration"); return; }

  const key = custom || generateRandomKey();

  await db.collection("keys").doc(key).set({
    active:true,
    blocked:false,
    used:false,
    used_by:"",
    duration_hours:duration,
    max_devices:maxDevices,
    devices:[],
    created_at: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("genOutput").innerText="Generated: "+key;
  loadKeys();
};

/* ================= LOAD KEYS ================= */

async function loadKeys(){

  const snapshot = await db.collection("keys").get();
  const container = document.getElementById("keysContainer");
  container.innerHTML="";

  let total=0, used=0, blocked=0;

  snapshot.forEach(doc=>{
    total++;
    const d=doc.data();

    let status="Unused";
    let statusClass="status-unused";

    if(d.blocked){
      status="Blocked";
      statusClass="status-blocked";
      blocked++;
    }
    else if(d.used){
      status="Used";
      statusClass="status-used";
      used++;
    }

    const card=document.createElement("div");
    card.className="keyCard";

    card.innerHTML=`
      <div class="keyHeader">${doc.id}</div>
      <div class="${statusClass}">${status}</div>
      <div>Duration: ${d.duration_hours}h</div>
      <div>Used By: ${d.used_by||"-"}</div>
      <div class="flex">
        <button class="secondary">Edit</button>
        <button class="danger">Delete</button>
        <button class="primary">Block</button>
      </div>
    `;

    const buttons=card.querySelectorAll("button");

    // Edit
    buttons[0].onclick=async()=>{
      const newDuration=prompt("New duration:",d.duration_hours);
      if(newDuration){
        await db.collection("keys").doc(doc.id)
          .update({duration_hours:parseInt(newDuration)});
        loadKeys();
      }
    };

    // Delete
    buttons[1].onclick=async()=>{
      if(confirm("Delete key?")){
        await db.collection("keys").doc(doc.id).delete();
        loadKeys();
      }
    };

    // Block
    buttons[2].onclick=async()=>{
      await db.collection("keys").doc(doc.id)
        .update({blocked:true});
      loadKeys();
    };

    container.appendChild(card);
  });

  document.getElementById("stats").innerText=
    `Total:${total} | Used:${used} | Blocked:${blocked}`;
}

</script>

</body>
</html>

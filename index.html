<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secure Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f2027;
color:white;
}

.container{
padding:15px;
max-width:1100px;
margin:auto;
}

.card{
background:#1c2b3a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

h2{
margin:0 0 10px 0;
font-size:18px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
padding:7px 10px;
border:none;
border-radius:6px;
font-size:12px;
cursor:pointer;
margin:3px;
}

.primary{background:#0072ff;color:white}
.danger{background:#ff4d4d;color:white}
.success{background:#00aa66;color:white}
.secondary{background:#666;color:white}
.warning{background:#ffaa00;color:black}

.stats{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

.stat{
background:#15222e;
padding:10px;
border-radius:8px;
font-size:12px;
}

.search{
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:10px;
}

.keyCard{
background:#15222e;
padding:10px;
border-radius:10px;
font-size:12px;
}

.keyHeader{
font-weight:600;
word-break:break-all;
margin-bottom:5px;
}

.badge{
padding:2px 6px;
border-radius:5px;
font-size:11px;
}

.active{background:#00aa66}
.expired{background:#ff8800}
.blocked{background:#ff4d4d}
.unused{background:#777}

.flex{
display:flex;
flex-wrap:wrap;
gap:4px;
margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="primary" id="loginBtn">Login</button>

</div>


<div id="dashboard" style="display:none">

<div class="card">

<h2>Generate Key</h2>

<input id="customKey" placeholder="Custom Key (optional)">
<input id="duration" type="number" placeholder="Duration Hours">
<input id="maxDevices" type="number" placeholder="Max Devices (default 1)">
<input id="note" placeholder="Notes (optional)">

<button class="primary" id="generateBtn">Generate</button>
<button class="secondary" id="logoutBtn">Logout</button>

<div id="genOutput"></div>

</div>


<div class="card">

<h2>Dashboard</h2>

<div id="stats" class="stats"></div>

<input class="search" id="searchBox" placeholder="Search key / UID">

<div id="keysContainer" class="grid"></div>

</div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCunwuvg0saSDxN7HbNwmwaIdOuBYA-tX0",
authDomain:"pw--login.firebaseapp.com",
projectId:"pw--login",
appId:"1:1062401933606:web:6f0fc04649cc77707841e7"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

/* ================= AUTH ================= */

auth.onAuthStateChanged(async user=>{

if(!user){
showLogin();
return;
}

const adminDoc=await db.collection("admins").doc(user.uid).get();

if(!adminDoc.exists){
alert("Not authorized");
auth.signOut();
return;
}

showDashboard();
loadKeys();

});

function showLogin(){
loginBox.style.display="block";
dashboard.style.display="none";
}

function showDashboard(){
loginBox.style.display="none";
dashboard.style.display="block";
}

/* ================= LOGIN ================= */

loginBtn.onclick=()=>{
auth.signInWithEmailAndPassword(
email.value,
password.value
).catch(e=>alert(e.message));
};

logoutBtn.onclick=()=>auth.signOut();

/* ================= GENERATE KEY ================= */

function generateRandomKey(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let key="";

const arr=new Uint32Array(10);

crypto.getRandomValues(arr);

for(let i=0;i<10;i++){
key+=chars[arr[i]%chars.length];
}

return key;
}

generateBtn.onclick=async()=>{

const custom=customKey.value.trim();
const duration=parseInt(duration.value);
const max=parseInt(maxDevices.value)||1;
const noteText=note.value||"";

if(!duration){
alert("Enter duration");
return;
}

const key=custom||generateRandomKey();

await db.collection("keys").doc(key).set({

active:true,
blocked:false,
used:false,
used_by:"",
devices:[],
duration_hours:duration,
max_devices:max,
note:noteText,
created_at:firebase.firestore.FieldValue.serverTimestamp(),
access_expires:null

});

genOutput.innerText="Generated: "+key;

};

/* ================= LOAD KEYS ================= */

function loadKeys(){

db.collection("keys").onSnapshot(snapshot=>{

keysContainer.innerHTML="";

let total=0;
let active=0;
let expired=0;
let blocked=0;
let unused=0;

snapshot.forEach(doc=>{

total++;

const d=doc.data();
const key=doc.id;

let status="unused";
let label="Unused";

if(d.blocked){
status="blocked";
label="Blocked";
blocked++;
}
else if(d.used){

if(d.access_expires && d.access_expires.toDate()<new Date()){
status="expired";
label="Expired";
expired++;
}else{
status="active";
label="Active";
active++;
}

}else{
unused++;
}

const card=document.createElement("div");

card.className="keyCard";

let expires="Not activated";

if(d.access_expires){
expires=d.access_expires.toDate().toLocaleString();
}

card.innerHTML=`

<div class="keyHeader">${key}</div>

<div class="badge ${status}">${label}</div>

<div>Duration: ${d.duration_hours}h</div>

<div>Devices: ${(d.devices||[]).length}/${d.max_devices}</div>

<div>User: ${d.used_by||"-"}</div>

<div>Expires: ${expires}</div>

<div>Note: ${d.note||"-"}</div>

<div class="flex">

<button class="secondary copy">Copy</button>
<button class="success extend">+1h</button>
<button class="success extend24">+24h</button>
<button class="warning reset">Reset</button>
<button class="primary block">${d.blocked?"Unblock":"Block"}</button>
<button class="danger delete">Delete</button>

</div>
`;

const buttons=card.querySelectorAll("button");

/* copy */

buttons[0].onclick=()=>{
navigator.clipboard.writeText(key);
alert("Copied");
};

/* extend */

buttons[1].onclick=()=>extendKey(key,1);
buttons[2].onclick=()=>extendKey(key,24);

/* reset */

buttons[3].onclick=()=>resetKey(key);

/* block */

buttons[4].onclick=()=>toggleBlock(key,d.blocked);

/* delete */

buttons[5].onclick=()=>{
if(confirm("Delete key?")){
db.collection("keys").doc(key).delete();
}
};

keysContainer.appendChild(card);

});

stats.innerHTML=`

<div class="stat">Total: ${total}</div>
<div class="stat">Active: ${active}</div>
<div class="stat">Expired: ${expired}</div>
<div class="stat">Blocked: ${blocked}</div>
<div class="stat">Unused: ${unused}</div>

`;

});

}

/* ================= ACTIONS ================= */

async function extendKey(key,hours){

const ref=db.collection("keys").doc(key);
const doc=await ref.get();

let newExpire=new Date();

if(doc.data().access_expires){

const old=doc.data().access_expires.toDate();

if(old>new Date()){
newExpire=new Date(old.getTime()+hours*3600000);
}else{
newExpire=new Date(Date.now()+hours*3600000);
}

}else{

newExpire=new Date(Date.now()+hours*3600000);

}

await ref.update({access_expires:newExpire});

}

async function resetKey(key){

if(!confirm("Reset key?")) return;

await db.collection("keys").doc(key).update({

used:false,
used_by:"",
devices:[],
access_expires:null

});

}

async function toggleBlock(key,state){

await db.collection("keys").doc(key).update({
blocked:!state
});

}

/* ================= SEARCH ================= */

searchBox.oninput=()=>{

const text=searchBox.value.toLowerCase();

document.querySelectorAll(".keyCard").forEach(card=>{

if(card.innerText.toLowerCase().includes(text))
card.style.display="block";
else
card.style.display="none";

});

};

</script>

</body>
</html>
